    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
    opacity: 0.7;
  }

    align-self: flex-start;
    padding: 10px 14px;
    background: #fff;
    border: 1px solid #f0d9a0;
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    display: none;
    gap: 4px;
  }

    width: 7px; height: 7px;
    background: #cba84a;
    border-radius: 50%;
    display: inline-block;
    animation: bounce 1.2s infinite;
  }

  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  .input-area {
    padding: 12px 16px;
    background: #fff;
    border-top: 1px solid #f0d9a0;
    display: flex;
    gap: 10px;
  }

  .input-area input {
    flex: 1;
    padding: 10px 14px;
    border: 2px solid #f0d9a0;
    border-radius: 24px;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-area button {
    background: linear-gradient(135deg, #f4a623, #e8891c);
    color: white;
    border: none;
    border-radius: 24px;
    padding: 10px 20px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s;
  }

  .input-area button:active { transform: scale(0.96); }
</style>

// ── The Brain: figures out what the user is talking about ─
function getResponse(input) {
  var text = input.toLowerCase();

  // Check each topic's keywords to find a match
  for (var topic in keywords) {
    var words = keywords[topic];
    for (var i = 0; i < words.length; i++) {
      if (text.includes(words[i])) {
        // Found a match! Pick a random response from that topic
        var replies = responses[topic];
        return replies[Math.floor(Math.random() * replies.length)];
      }
    }
  }

  // Nothing matched — steer them back to mac and cheese
  return offTopic[Math.floor(Math.random() * offTopic.length)];
}

// ── Chat UI Logic ────────────────────────────────────────
var chat = document.getElementById('chat');
var typing = document.getElementById('typing');
var userInput = document.getElementById('userInput');
var sendBtn = document.getElementById('sendBtn');

function addMessage(text, sender) {
  var div = document.createElement('div');
  div.className = 'message ' + sender;
  if (sender === 'bot') {
    div.innerHTML = '<div class="name">Cheddar Bot</div>' + text;
  } else {
    div.textContent = text;
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  typing.style.display = 'flex';
  chat.appendChild(typing);
  chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
  typing.style.display = 'none';
}

function handleSend() {
  var text = userInput.value.trim();
  if (!text) return;

  addMessage(text, 'user');
  userInput.value = '';

  // Show "typing..." dots, then reply after a short delay
  showTyping();
  var delay = 400 + Math.random() * 800;
  setTimeout(function() {
    hideTyping();
    addMessage(getResponse(text), 'bot');
  }, delay);
}

sendBtn.addEventListener('click', handleSend);
userInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') handleSend();
});

userInput.focus();

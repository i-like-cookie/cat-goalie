<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Article 1 - Understanding AI</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%A4%96%3C/text%3E%3C/svg%3E">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        background: #f7f7f7;
        color: #333;
      }
      body.dark {
        background: #1a1a2e;
        color: #e0e0e0;
      }
      .top-bar {
        background: white;
        padding: 16px 24px;
        border-bottom: 1px solid #e0e0e0;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      body.dark .top-bar {
        background: #16213e;
        border-bottom-color: #2a2a4a;
      }
      .back-btn {
        text-decoration: none;
        color: #4a90e2;
        font-weight: 600;
        font-size: 1rem;
      }
      .back-btn:hover { text-decoration: underline; }
      .dark-toggle {
        background: none;
        border: 2px solid #ccc;
        border-radius: 20px;
        padding: 6px 14px;
        font-size: 0.9rem;
        cursor: pointer;
        color: #555;
      }
      .dark-toggle:hover { border-color: #888; color: #222; }
      body.dark .dark-toggle { border-color: #555; color: #bbb; }
      body.dark .dark-toggle:hover { border-color: #999; color: #eee; }
      .article-page {
        max-width: 800px;
        margin: 40px auto;
        padding: 0 24px 60px;
      }
      .article-page h1 {
        text-align: center;
        font-size: 2rem;
        font-weight: 900;
        margin-bottom: 30px;
        color: #222;
      }
      body.dark .article-page h1 { color: #e0e0e0; }
      .article-page p {
        line-height: 1.7;
        margin-bottom: 14px;
        color: #555;
        text-align: center;
      }
      body.dark .article-page p { color: #bbb; }
    </style>
  </head>
  <body>
    <div class="top-bar">
      <a href="ai-takeover.html#articles" class="back-btn">&larr; Back to Articles</a>
      <button class="dark-toggle" id="darkToggle">Dark Mode</button>
    </div>
    <div class="article-page">
      <h1>Article 1 Title (Coming Soon)</h1>
      <p>This article is coming soon. Check back later!</p>
    </div>

    <script>
      document.getElementById("darkToggle").addEventListener("click", () => {
        document.body.classList.toggle("dark");
        const btn = document.getElementById("darkToggle");
        btn.textContent = document.body.classList.contains("dark") ? "Light Mode" : "Dark Mode";
      });
    </script>
  </body>
</html>
